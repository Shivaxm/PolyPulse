server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/polypulse}
    username: ${DATABASE_USERNAME:polypulse}
    password: ${DATABASE_PASSWORD:polypulse}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.polypulse: INFO
    root: INFO

polypulse:
  polymarket:
    gamma-url: https://gamma-api.polymarket.com
    clob-url: https://clob.polymarket.com
    ws-url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  sync:
    market-interval-ms: 300000
    category-tags:
      politics: 2
      crypto: 21
      sports: 100639
      finance: 120
      tech: 1401
      culture: 596
      geopolitics: 100265
  news:
    api-key: ${NEWS_API_KEY:}
    poll-interval-ms: 120000
    provider: newsapi
  correlation:
    min-price-delta: 0.01
    before-window-minutes: 15
    after-window-minutes: 45
    min-confidence: 0.3
    max-candidate-markets: 30
    recheck-delay-minutes: 15
    cooldown-minutes: 30

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
