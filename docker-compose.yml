services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polypulse
      POSTGRES_USER: polypulse
      POSTGRES_PASSWORD: polypulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polypulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/polypulse
      DATABASE_USERNAME: polypulse
      DATABASE_PASSWORD: polypulse
      REDIS_HOST: redis
      NEWS_API_KEY: ${NEWS_API_KEY:-dff5341b38394b79bcd90d444030ae96}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
