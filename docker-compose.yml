services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polypulse
      POSTGRES_USER: polypulse
      POSTGRES_PASSWORD: polypulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polypulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: polypulse
      PGUSER: polypulse
      PGPASSWORD: polypulse
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: true
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
